    <circle cx="0"     cy="-20" r="6" fill="#2ae585"/>
    <circle cx="0"     cy="20"  r="6" fill="#2ae585"/>
    <circle cx="17.3"  cy="10"  r="6" fill="#2ae585"/>

    <!-- Puntos bajos (gris) -->
    <circle cx="-17.3" cy="10"  r="6" fill="#cccccc"/>
    <circle cx="17.3"  cy="-10" r="6" fill="#cccccc"/>

    <!-- Línea verde que forma la T -->
